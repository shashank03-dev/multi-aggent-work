<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to App Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .upload-section {
            border: 2px dashed #3498db;
            padding: 40px;
            text-align: center;
            border-radius: 8px;
            background: #ebf5fb;
            cursor: pointer;
            transition: background 0.3s;
        }
        .upload-section:hover {
            background: #d6eaf8;
        }
        #file-input {
            display: none;
        }
        .btn {
            background: #3498db;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        .status-container {
            margin-top: 40px;
            display: none;
        }
        .status-header {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
            color: #34495e;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #2ecc71;
            transition: width 0.5s;
        }
        .logs {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .log-entry {
            margin-bottom: 5px;
        }
        .log-entry.info { color: #3498db; }
        .log-entry.success { color: #2ecc71; }
        .log-entry.error { color: #e74c3c; }
        #download-btn {
            display: none;
            background: #27ae60;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PDF to App Generator</h1>
        
        <div class="upload-section" onclick="document.getElementById('file-input').click()">
            <p id="file-name">Click or drag & drop your PDF requirements here</p>
            <input type="file" id="file-input" accept=".pdf" onchange="handleFileSelect(event)">
        </div>
        
        <button id="generate-btn" class="btn" onclick="startGeneration()" disabled>Generate Application</button>

        <div id="status-container" class="status-container">
            <div class="status-header">Job ID: <span id="job-id-text">-</span></div>
            <div id="status-text">Status: Starting...</div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div class="status-header">Agent Logs:</div>
            <div id="logs" class="logs">
                <div class="log-entry info">Waiting for upload...</div>
            </div>
            <button id="download-btn" class="btn" onclick="downloadResult()">Download Generated Project (.zip)</button>
        </div>
    </div>

    <script>
        let currentJobId = null;
        let selectedFile = null;

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                document.getElementById('file-name').innerText = `Selected: ${selectedFile.name}`;
                document.getElementById('generate-btn').disabled = false;
            }
        }

        async function startGeneration() {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);

            document.getElementById('generate-btn').disabled = true;
            document.getElementById('status-container').style.display = 'block';
            addLog("Uploading PDF and starting extraction...", "info");

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                currentJobId = data.job_id;
                document.getElementById('job-id-text').innerText = currentJobId;
                pollStatus();
            } catch (error) {
                addLog(`Error: ${error.message}`, "error");
            }
        }

        async function pollStatus() {
            if (!currentJobId) return;

            try {
                const response = await fetch(`/status/${currentJobId}`);
                const data = await response.json();
                
                document.getElementById('status-text').innerText = `Status: ${data.status}`;
                addLog(data.status, "info");

                // Simple progress logic based on status string
                let progress = 0;
                if (data.status.includes("Extracting")) progress = 20;
                if (data.status.includes("Parsing")) progress = 40;
                if (data.status.includes("Generating")) progress = 70;
                if (data.status.includes("Creating zip")) progress = 90;
                if (data.status === "Completed") progress = 100;
                
                document.getElementById('progress-fill').style.width = `${progress}%`;

                if (data.status === "Completed") {
                    addLog("Project generation complete!", "success");
                    document.getElementById('download-btn').style.display = 'block';
                } else if (data.status.startsWith("Error") || data.status.startsWith("Failed")) {
                    addLog(data.status, "error");
                } else {
                    setTimeout(pollStatus, 2000);
                }
            } catch (error) {
                console.error("Polling error:", error);
            }
        }

        function addLog(message, type) {
            const logsDiv = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        function downloadResult() {
            if (currentJobId) {
                window.location.href = `/download/${currentJobId}`;
            }
        }
    </script>
</body>
</html>
